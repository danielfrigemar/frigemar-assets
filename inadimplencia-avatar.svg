<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="clip">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Fundo: círculo azul escuro -->
    <circle cx="128" cy="128" r="128" fill="#1A2E4D"/>

    <!-- Corpo do documento -->
    <polygon points="52,36 142,36 164,58 164,196 52,196" fill="#FFFFFF"/>

    <!-- Dobra (dog-ear) -->
    <polygon points="142,36 164,58 142,58" fill="#D0D0D5"/>

    <!-- Cabeçalho azul -->
    <rect x="52" y="36" width="90" height="30" fill="#0072CE"/>

    <!-- Linhas de conteúdo — nome (cinza) + valor (cinza escuro) -->
    <rect x="66" y="82"  width="52" height="7" rx="3" fill="#C0C0C5"/>
    <rect x="124" y="82" width="26" height="7" rx="3" fill="#909095"/>

    <rect x="66" y="100" width="52" height="7" rx="3" fill="#C0C0C5"/>
    <rect x="124" y="100" width="26" height="7" rx="3" fill="#909095"/>

    <rect x="66" y="118" width="52" height="7" rx="3" fill="#C0C0C5"/>
    <rect x="124" y="118" width="26" height="7" rx="3" fill="#909095"/>

    <rect x="66" y="136" width="32" height="7" rx="3" fill="#C0C0C5"/>
    <rect x="124" y="136" width="26" height="7" rx="3" fill="#909095"/>

    <!-- Barra de total -->
    <rect x="66" y="162" width="84" height="16" rx="4" fill="#E6E5E3"/>
    <!-- Destaque dourado no valor -->
    <rect x="112" y="162" width="38" height="16" rx="4" fill="#DC9E49"/>

    <!-- Badge de alerta: círculo vermelho com "!" -->
    <circle cx="186" cy="186" r="38" fill="#CC2D2D" stroke="#FFFFFF" stroke-width="5"/>

    <!-- "!" — corpo -->
    <rect x="182" y="163" width="8" height="22" rx="4" fill="#FFFFFF"/>
    <!-- "!" — ponto -->
    <circle cx="186" cy="196" r="5" fill="#FFFFFF"/>

  </g>
</svg>
